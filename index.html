<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aman Safari</title>

<style>
:root{
--gold:#d4af37;
--dark:#07130e;
--glass:rgba(255,255,255,.05);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:var(--dark);
color:white;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
right:0;
padding:16px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.3);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
color:var(--gold);
font-size:20px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:15px;
font-size:14px;
}

nav a:hover{
color:var(--gold);
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 6%;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:clamp(40px,7vw,80px);
}

.hero span{color:var(--gold);}

.hero p{
margin-top:15px;
max-width:500px;
color:#ddd;
}

/* BUTTONS */
.btn{
padding:12px 22px;
border-radius:999px;
text-decoration:none;
display:inline-block;
margin-top:20px;
transition:.3s;
}

.primary{
background:var(--gold);
color:black;
font-weight:bold;
}

.secondary{
border:1px solid white;
color:white;
margin-left:10px;
}

.btn:hover{transform:translateY(-3px);}

/* SECTION */
.section{
padding:80px 6%;
}

/* BOOKING */
.booking{
background:var(--glass);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
}

.booking h2{
margin-bottom:20px;
}

.booking form{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.booking input,
.booking select,
.booking textarea{
padding:14px;
border:none;
border-radius:12px;
background:#1a2720;
color:white;
}

.booking textarea{
grid-column:span 2;
height:100px;
}

.booking button{
grid-column:span 2;
padding:14px;
border:none;
background:var(--gold);
font-weight:bold;
border-radius:999px;
cursor:pointer;
}

/* PARKS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:var(--glass);
padding:25px;
border-radius:18px;
text-decoration:none;
color:white;
border:1px solid rgba(255,255,255,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
border-color:var(--gold);
}

/* FLOAT CHAT BUTTON */
#chatBtn{
position:fixed;
bottom:18px;
right:18px;
width:55px;
height:55px;
border-radius:50%;
background:#00a884;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
}

/* CHAT BOX */
#chatBox{
position:fixed;
bottom:85px;
right:18px;
width:320px;
height:450px;
background:#0b141a;
border-radius:16px;
display:none;
flex-direction:column;
overflow:hidden;
border:1px solid rgba(255,255,255,.1);
}

#top{
background:#111b21;
padding:10px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

#messages{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:75%;
font-size:14px;
}

.user{
align-self:flex-end;
background:#005c4b;
}

.ai{
align-self:flex-start;
background:#202c33;
}

.inputBox{
display:flex;
padding:10px;
gap:8px;
background:#111b21;
}

.inputBox input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#202c33;
color:white;
}

.inputBox button{
background:var(--gold);
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
}

@media(max-width:768px){
.booking form{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">AMAN SAFARI</div>
<div>
<a href="#booking">Booking</a>
<a href="#parks">Parks</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Luxury <span>Tanzania Safari</span></h1>
<p>Explore Serengeti, Ngorongoro, Tarangire and more with premium safari experiences.</p>

<a class="btn primary" href="#booking">Book Now</a>
<a class="btn secondary" href="#parks">Explore</a>
</div>
</section>

<!-- BOOKING -->
<section id="booking" class="section">
<div class="booking">
<h2>Book Your Safari</h2>

<form>
<input placeholder="Full Name">
<input placeholder="Email">
<input placeholder="WhatsApp">
<select>
<option>Select Park</option>
<option>Serengeti</option>
<option>Tarangire</option>
<option>Ngorongoro</option>
<option>Ruaha</option>
<option>Kilimanjaro</option>
</select>
<input type="date">
<input type="number" placeholder="People">
<textarea placeholder="Message"></textarea>
<button type="button">Send Booking</button>
</form>

</div>
</section>

<!-- PARKS -->
<section id="parks" class="section">
<div class="grid">

<a class="card" href="serengeti.html">
🦁 Serengeti
</a>

<a class="card" href="tarangire.html">
🐘 Tarangire
</a>

<a class="card" href="ngorongoro.html">
🌋 Ngorongoro
</a>

</div>
</section>

<!-- CHAT BUTTON -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div id="chatBox">

<div id="top">
AI Assistant
<span onclick="toggleChat()" style="cursor:pointer">✖</span>
</div>

<div id="messages"></div>

<div class="inputBox">
<input id="msg" placeholder="Ask anything...">
<button onclick="sendAI()">➤</button>
</div>

</div>

<script>
function toggleChat(){
const box = document.getElementById("chatBox");
box.style.display = box.style.display === "flex" ? "none" : "flex";
box.style.flexDirection = "column";
}

async function sendAI(){
const input = document.getElementById("msg");
const messages = document.getElementById("messages");

const text = input.value.trim();
if(!text) return;

messages.innerHTML += `<div class="msg user">${text}</div>`;
input.value = "";

const res = await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data = await res.json();

messages.innerHTML += `<div class="msg ai">${data.reply}</div>`;
messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
  </html>
