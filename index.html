<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Aman Safari</title>

<style>

:root{
--gold:#d4af37;
--dark:#07130e;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#07130e;
color:white;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
left:0;
right:0;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 6%;

background:rgba(0,0,0,.3);

backdrop-filter:blur(12px);

z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
color:var(--gold);
}

.links{
display:flex;
gap:18px;
list-style:none;
}

.links a{
color:white;
text-decoration:none;
}

.links a:hover{
color:var(--gold);
}

/* HERO */

.hero{

height:100vh;

display:flex;

align-items:center;

padding:0 6%;

background:
linear-gradient(
rgba(0,0,0,.25),
rgba(0,0,0,.55)
),

url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80");

background-size:cover;
background-position:center;

}

.hero-content{
max-width:650px;
}

.hero h1{
font-size:
clamp(
42px,
8vw,
90px
);
}

.gold{
color:var(--gold);
}

.hero p{

margin-top:18px;

line-height:1.8;

color:#ddd;

}

/* BUTTON */

.cta{
margin-top:25px;
display:flex;
gap:15px;
}

.btn{

padding:14px 26px;

border-radius:999px;

text-decoration:none;

}

.primary{
background:var(--gold);
color:black;
}

.secondary{

border:1px solid white;

color:white;

}

/* BOOKING */

.section{
padding:90px 6%;
}

.booking{

background:
rgba(255,255,255,.06);

backdrop-filter:blur(20px);

padding:35px;

border-radius:30px;

}

.booking h2{
margin-bottom:20px;
}

.booking form{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}

.booking input,
.booking select,
.booking textarea{

padding:16px;

border:none;

border-radius:14px;

background:
rgba(255,255,255,.05);

color:white;

}

.booking textarea{

grid-column:span 2;

height:120px;

}

.booking button{

grid-column:span 2;

padding:16px;

border:none;

border-radius:999px;

background:var(--gold);

font-weight:bold;

}

/* PARKS */

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(220px,1fr)
);

gap:20px;

}

.card{

background:
rgba(255,255,255,.05);

padding:28px;

border-radius:24px;

color:white;

text-decoration:none;

transition:.3s;

}

.card:hover{

transform:
translateY(-6px);

}

/* CHAT FLOAT */

#chatBtn{

position:fixed;

bottom:20px;

right:20px;

width:58px;

height:58px;

border-radius:50%;

background:#00a884;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

font-size:24px;

}

/* CHAT */

#chatBox{

position:fixed;

bottom:90px;

right:20px;

width:330px;

height:500px;

background:#0b141a;

display:none;

flex-direction:column;

border-radius:22px;

overflow:hidden;

}

#topBar{

background:#111b21;

padding:14px;

display:flex;

justify-content:space-between;

}

#messages{

flex:1;

padding:12px;

overflow:auto;

display:flex;

flex-direction:column;

gap:10px;

}

.msg{

padding:12px;

border-radius:12px;

max-width:75%;

}

.user{

align-self:flex-end;

background:#005c4b;

}

.ai{

align-self:flex-start;

background:#202c33;

}

.time{

font-size:10px;

opacity:.6;

margin-top:4px;

}

#typing{

padding:10px;

font-size:12px;

display:none;

}

.inputBox{

display:flex;

padding:10px;

gap:8px;

background:#111b21;

}

.inputBox input{

flex:1;

padding:12px;

border:none;

border-radius:12px;

}

.inputBox button{

padding:12px;

background:var(--gold);

border:none;

border-radius:12px;

}

/* MOBILE */

@media(max-width:800px){

.links{
display:none;
}

.booking form{
grid-template-columns:1fr;
}

.booking textarea,
.booking button{
grid-column:auto;
}

#chatBox{

width:
calc(100% - 30px);

right:15px;

}

}

</style>

</head>

<body>

<nav>

<div class="logo">
AMAN SAFARI
</div>

<ul class="links">

<li><a href="serengeti.html">Serengeti</a></li>

<li><a href="tarangire.html">Tarangire</a></li>

<li><a href="ngorongoro.html">Ngorongoro</a></li>

<li><a href="ruaha.html">Ruaha</a></li>

<li><a href="kilimanjaro.html">Kilimanjaro</a></li>

</ul>

</nav>

<section class="hero">

<div class="hero-content">

<h1>

Explore

<span class="gold">

Luxury Tanzania

</span>

</h1>

<p>

Premium safari experiences.

</p>

<div class="cta">

<a class="btn primary" href="#booking">

Reserve

</a>

<a class="btn secondary" href="#parks">

Discover

</a>

</div>

</div>

</section>

<section id="booking" class="section">

<div class="booking">

<h2>Book Your Safari</h2>

<form>

<input placeholder="Full Name">

<input placeholder="Email">

<select>

<option>Choose Park</option>

<option>Serengeti</option>

<option>Tarangire</option>

<option>Ngorongoro</option>

</select>

<input type="date">

<textarea placeholder="Special requests"></textarea>

<button>

Reserve Safari

</button>

</form>

</div>

</section>

<section id="parks" class="section">

<div class="grid">

<a class="card" href="serengeti.html">
🦁 Serengeti
</a>

<a class="card" href="tarangire.html">
🐘 Tarangire
</a>

<a class="card" href="ngorongoro.html">
🌋 Ngorongoro
</a>

</div>

</section>

<div id="chatBtn" onclick="toggleChat()">

💬

</div>

<div id="chatBox">

<div id="topBar">

Aman AI

<span onclick="toggleChat()">

✕

</span>

</div>

<div id="messages"></div>

<div id="typing">

Typing...

</div>

<div class="inputBox">

<input id="msg">

<button onclick="sendAI()">

➤

</button>

</div>

</div>

<script>

function toggleChat(){

const c =
document.getElementById("chatBox");

c.style.display =
c.style.display==="flex"
?
"none"
:
"flex";

}

function now(){

const d =
new Date();

return d.getHours()+":"+
String(
d.getMinutes()
).padStart(
2,
"0"
);

}

async function sendAI(){

const input =
document.getElementById("msg");

const box =
document.getElementById("messages");

const typing =
document.getElementById("typing");

const text =
input.value.trim();

if(!text)return;

box.innerHTML+=
`
<div class="msg user">
${text}
<div class="time">${now()}</div>
</div>
`;

input.value="";

typing.style.display=
"block";

const res=
await fetch(
"http://localhost:3000/chat",
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify({
message:text
})
}
);

const data=
await res.json();

typing.style.display=
"none";

box.innerHTML+=
`
<div class="msg ai">
${data.reply}
<div class="time">${now()}</div>
</div>
`;

box.scrollTop=
box.scrollHeight;

}

</script>

</body>

  </html>
